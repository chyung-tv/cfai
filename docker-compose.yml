services:
  postgres:
    image: postgres:16-alpine
    container_name: cfai-postgres
    environment:
      POSTGRES_DB: cfai
      POSTGRES_USER: cfai
      POSTGRES_PASSWORD: cfai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfai -d cfai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cfai-backend
    working_dir: /app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cfai:cfai@postgres:5432/cfai
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    command: >
      sh -c "uv sync &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 3001 --reload"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cfai-frontend
    working_dir: /app
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CI: "true"
      PNPM_STORE_DIR: /pnpm/store
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_pnpm_store:/pnpm/store
    command: >
      sh -c "if [ ! -d node_modules/.pnpm ]; then pnpm install --frozen-lockfile; fi &&
             pnpm dev --hostname 0.0.0.0 --port 3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_venv:
  frontend_node_modules:
  frontend_pnpm_store:
